<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>관찰 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --primary: #4F46E5;
  --primary-light: #EEF2FF;
  --primary-mid: #818CF8;
  --primary-dark: #3730A3;
  --bg: #F5F5F0;
  --surface: #FFFFFF;
  --surface2: #F0F0EB;
  --border: #E2E2DA;
  --border-md: #C8C8BF;
  --text: #1C1C1A;
  --text-2: #5C5C58;
  --text-3: #9C9C96;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'Noto Sans KR', -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }

/* ── HEADER ── */
.app-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  height: 56px;
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
  padding-top: env(safe-area-inset-top, 0px);
}
.logo { width: 30px; height: 30px; background: var(--primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.logo svg { width: 16px; height: 16px; }
.header-title { font-size: 15px; font-weight: 600; flex: 1; }
.btn-icon { width: 36px; height: 36px; border-radius: 10px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); transition: background 0.15s; }
.btn-icon:hover, .btn-icon:active { background: var(--surface2); }

/* ── PROVIDER BAR ── */
.provider-bar {
  position: fixed; top: 56px; left: 0; right: 0; z-index: 190;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center; gap: 8px; overflow-x: auto;
}
.provider-bar::-webkit-scrollbar { display: none; }
.prov-label { font-size: 11px; color: var(--text-3); white-space: nowrap; flex-shrink: 0; }
.pchip {
  padding: 4px 12px; border-radius: 20px; font-size: 12px; white-space: nowrap;
  border: 1px solid var(--border-md); background: var(--surface); color: var(--text-2);
  cursor: pointer; font-family: inherit; transition: all 0.12s; flex-shrink: 0;
  display: flex; align-items: center; gap: 4px;
}
.pchip.active { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: 500; }
.pchip.ok { border-color: #16A34A; color: #16A34A; }
.pchip.ok.active { background: #16A34A; border-color: #16A34A; color: #fff; }
.pchip.disabled { opacity: 0.4; pointer-events: none; }
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: #16A34A; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── MEMBER TABS ── */
.member-tabs-wrap {
  position: fixed; top: 96px; left: 0; right: 0; z-index: 180;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.member-tabs {
  display: flex; align-items: center; gap: 0;
  overflow-x: auto; padding: 0 16px;
}
.member-tabs::-webkit-scrollbar { display: none; }
.mtab {
  padding: 12px 16px; font-size: 13px; font-weight: 500; white-space: nowrap;
  border-bottom: 2px solid transparent; color: var(--text-3);
  cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  display: flex; align-items: center; gap: 6px;
}
.mtab.active { color: var(--primary); border-bottom-color: var(--primary); }
.mtab .badge { font-size: 10px; background: var(--surface2); color: var(--text-3); padding: 1px 6px; border-radius: 10px; }
.mtab.active .badge { background: var(--primary-light); color: var(--primary); }
.btn-add-member {
  padding: 8px 14px; font-size: 12px; white-space: nowrap; flex-shrink: 0;
  border: 1.5px dashed var(--border-md); border-radius: 20px;
  background: none; color: var(--text-3); cursor: pointer; font-family: inherit;
  margin-left: 4px; transition: all 0.15s;
}
.btn-add-member:active { background: var(--surface2); }

/* ── SCROLL BODY ── */
.scroll-body {
  padding-top: calc(56px + 40px + 48px + 8px);
  padding-bottom: calc(80px + var(--safe-bottom));
  min-height: 100vh;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 4rem 2rem; color: var(--text-3);
}
.empty-state .icon { font-size: 44px; margin-bottom: 14px; }
.empty-state h3 { font-size: 16px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
.empty-state p { font-size: 13px; line-height: 1.6; }

/* ── MEMBER SECTION ── */
.member-section { padding: 0 16px; }

/* ── SUMMARY BOX ── */
.summary-box {
  background: linear-gradient(135deg, #EEF2FF, #F5F3FF);
  border: 1px solid #C7D2FE; border-radius: var(--radius-lg);
  padding: 16px; margin-bottom: 14px;
}
.summary-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.summary-header h4 { font-size: 13px; font-weight: 600; color: var(--primary-dark); flex: 1; }
.summary-prov { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #C7D2FE; color: var(--primary-dark); }
.stabs { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
.stab {
  padding: 5px 12px; border-radius: 20px; font-size: 12px;
  border: 1px solid #C7D2FE; background: #fff; color: var(--primary);
  cursor: pointer; font-family: inherit;
}
.stab.active { background: var(--primary-dark); border-color: var(--primary-dark); color: #fff; }
.summary-body { font-size: 13px; line-height: 1.8; color: #312E81; white-space: pre-wrap; }
.loading-dots { display: inline-flex; gap: 4px; padding: 8px 0; }
.loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--primary-mid); animation: pulse 1.2s ease-in-out infinite; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

/* ── AI BUTTON ── */
.btn-ai-wrap { margin-bottom: 14px; }
.btn-ai {
  width: 100%; padding: 12px; border-radius: var(--radius-md);
  border: 1px solid var(--primary-mid); background: var(--primary-light);
  color: var(--primary); font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-ai:active { background: var(--primary); color: #fff; }
.ai-opts { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 0 4px; }
.ai-opt {
  flex: 1; min-width: 90px; padding: 9px 8px; border-radius: var(--radius-sm);
  border: 1px solid #C7D2FE; background: #fff; color: var(--primary);
  font-size: 13px; cursor: pointer; font-family: inherit; text-align: center;
  transition: all 0.12s;
}
.ai-opt:active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* ── ENTRIES ── */
.section-label { font-size: 11px; font-weight: 600; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.count-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--primary-light); color: var(--primary); font-weight: 500; text-transform: none; letter-spacing: 0; }
.entry-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 14px; margin-bottom: 8px;
}
.entry-meta { display: flex; gap: 7px; align-items: center; margin-bottom: 7px; }
.etag { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 10px; }
.etag.업무성과 { background: #DBEAFE; color: #1D4ED8; }
.etag.협업태도 { background: #EDE9FE; color: #5B21B6; }
.etag.커뮤니케이션 { background: #FFEDD5; color: #9A3412; }
.etag.성장가능성 { background: #DCFCE7; color: #15803D; }
.etag.기타 { background: var(--surface2); color: var(--text-3); }
.edate { font-size: 11px; color: var(--text-3); margin-left: auto; }
.etext { font-size: 14px; line-height: 1.65; color: var(--text); }
.btn-del { font-size: 11px; color: var(--text-3); background: none; border: none; cursor: pointer; padding: 4px 0; margin-top: 6px; font-family: inherit; }
.btn-del:active { color: #BE123C; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: calc(24px + var(--safe-bottom)); right: 20px; z-index: 300;
  width: 56px; height: 56px; border-radius: 16px;
  background: var(--primary); color: #fff; border: none;
  box-shadow: 0 4px 16px rgba(79,70,229,0.35);
  font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.fab:active { transform: scale(0.94); background: var(--primary-dark); }

/* ── BOTTOM SHEET ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 400;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 500;
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 20px 16px calc(20px + var(--safe-bottom));
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  max-height: 90vh; overflow-y: auto;
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border-md); margin: 0 auto 20px; }
.sheet-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }

/* ── RECORD FORM (inside sheet) ── */
.tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.tag-pill {
  padding: 6px 14px; border-radius: 20px; font-size: 13px;
  border: 1px solid var(--border-md); background: var(--surface2); color: var(--text-2);
  cursor: pointer; font-family: inherit; transition: all 0.12s;
}
.tag-pill.selected { font-weight: 500; }
.tag-pill[data-tag="업무성과"].selected { background: #DBEAFE; border-color: #3B82F6; color: #1D4ED8; }
.tag-pill[data-tag="협업태도"].selected { background: #EDE9FE; border-color: #7C3AED; color: #5B21B6; }
.tag-pill[data-tag="커뮤니케이션"].selected { background: #FFEDD5; border-color: #EA580C; color: #9A3412; }
.tag-pill[data-tag="성장가능성"].selected { background: #DCFCE7; border-color: #16A34A; color: #15803D; }
.tag-pill[data-tag="기타"].selected { background: var(--surface2); border-color: var(--border-md); color: var(--text-2); }
.entry-textarea {
  width: 100%; padding: 12px 14px; font-size: 14px; line-height: 1.7;
  border-radius: var(--radius-md); border: 1px solid var(--border-md);
  background: var(--bg); color: var(--text); resize: none; font-family: inherit;
  min-height: 120px; transition: border-color 0.15s;
}
.entry-textarea:focus { outline: none; border-color: var(--primary-mid); background: #fff; }
.entry-textarea::placeholder { color: var(--text-3); }
.btn-save {
  width: 100%; margin-top: 12px; padding: 14px;
  background: var(--primary); color: #fff; border: none; border-radius: var(--radius-md);
  font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.btn-save:active { background: var(--primary-dark); }

/* ── SETTINGS SHEET ── */
.settings-section { margin-bottom: 24px; }
.settings-label { font-size: 12px; font-weight: 600; color: var(--text-3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 10px; }
.settings-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.settings-row input {
  flex: 1; padding: 10px 12px; font-size: 13px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-md); background: var(--bg); color: var(--text); font-family: inherit;
}
.settings-row input:focus { outline: none; border-color: var(--primary-mid); }
.settings-row select {
  flex: 1; padding: 10px 12px; font-size: 13px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-md); background: var(--bg); color: var(--text); font-family: inherit;
}
.btn-sm {
  padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px;
  border: 1px solid var(--border-md); background: var(--surface); color: var(--text-2);
  cursor: pointer; font-family: inherit; white-space: nowrap;
}
.btn-sm:active { background: var(--surface2); }
.btn-sm.danger { border-color: #FECDD3; color: #BE123C; background: #FFF1F2; }
.category-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 6px;
}
.category-item span { flex: 1; font-size: 14px; }
.provider-key-row { margin-bottom: 8px; }
.provider-key-row label { font-size: 12px; color: var(--text-2); margin-bottom: 4px; display: block; }
.provider-key-row input {
  width: 100%; padding: 10px 12px; font-size: 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-md); background: var(--bg); color: var(--text);
  font-family: monospace;
}
.provider-key-row input:focus { outline: none; border-color: var(--primary-mid); }
.provider-key-row select {
  width: 100%; padding: 10px 12px; font-size: 13px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-md); background: var(--bg); color: var(--text); font-family: inherit;
  margin-top: 6px;
}
.ollama-status { font-size: 12px; padding: 4px 10px; border-radius: 10px; display: inline-flex; align-items: center; gap: 5px; }
.ollama-status.ok { background: #DCFCE7; color: #15803D; }
.ollama-status.err { background: #FFF1F2; color: #BE123C; }
.ollama-status.checking { background: var(--surface2); color: var(--text-3); }

/* ── MEMBER SHEET ── */
.member-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
.member-input-row input {
  flex: 1; padding: 12px 14px; font-size: 14px; border-radius: var(--radius-md);
  border: 1px solid var(--border-md); background: var(--bg); color: var(--text); font-family: inherit;
}
.member-input-row input:focus { outline: none; border-color: var(--primary-mid); }
.btn-primary-sm {
  padding: 12px 16px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500;
  border: none; background: var(--primary); color: #fff; cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.member-list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-md); margin-bottom: 8px;
}
.m-avatar {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--primary-light); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; flex-shrink: 0;
}
.m-info { flex: 1; }
.m-name { font-size: 14px; font-weight: 500; }
.m-count { font-size: 12px; color: var(--text-3); margin-top: 2px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(90px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1C1C1A; color: #fff; padding: 10px 20px;
  border-radius: 20px; font-size: 13px; opacity: 0;
  transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="logo">
    <svg viewBox="0 0 20 20" fill="none">
      <path d="M4 5h12M4 10h8M4 15h10" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      <circle cx="16" cy="14" r="3.5" fill="#818CF8" stroke="#fff" stroke-width="1.2"/>
      <path d="M15 14l.8.8 1.4-1.6" stroke="#fff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <span class="header-title">관찰 기록</span>
  <button class="btn-icon" onclick="openSettings()" title="설정">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  </button>
</header>

<!-- PROVIDER BAR -->
<div class="provider-bar" id="providerBar">
  <span class="prov-label">AI</span>
  <div id="providerChips"></div>
  <span id="ollamaStatus" class="ollama-status checking" style="margin-left:4px">확인 중</span>
</div>

<!-- MEMBER TABS -->
<div class="member-tabs-wrap">
  <div class="member-tabs" id="memberTabs"></div>
</div>

<!-- SCROLL BODY -->
<div class="scroll-body" id="scrollBody">
  <div class="empty-state" id="emptyState">
    <div class="icon">👥</div>
    <h3>구성원을 추가해 주세요</h3>
    <p>상단 탭 오른쪽 + 버튼으로<br>구성원을 추가할 수 있어요.</p>
  </div>
  <div id="memberContent" style="display:none"></div>
</div>

<!-- FAB -->
<button class="fab" id="fab" onclick="openRecord()" title="기록 추가" style="display:none">
  <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
</button>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- RECORD SHEET -->
<div class="sheet" id="recordSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="recordSheetTitle">기록 추가</div>
  <div class="tag-row" id="tagRow"></div>
  <textarea class="entry-textarea" id="entryText" placeholder="오늘 관찰한 내용을 적어주세요. 구체적일수록 평가 때 도움이 돼요."></textarea>
  <button class="btn-save" onclick="saveEntry()">저장하기</button>
</div>

<!-- MEMBER SHEET -->
<div class="sheet" id="memberSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">구성원 관리</div>
  <div class="member-input-row">
    <input type="text" id="newMemberInput" placeholder="이름 입력" maxlength="20"/>
    <button class="btn-primary-sm" onclick="addMember()">추가</button>
  </div>
  <div id="memberListEl"></div>
</div>

<!-- SETTINGS SHEET -->
<div class="sheet" id="settingsSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">설정</div>

  <div class="settings-section">
    <div class="settings-label">AI 제공사</div>
    <div id="settingsProviderChips" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px"></div>
    <div id="settingsProviderConfig"></div>
  </div>

  <div class="settings-section">
    <div class="settings-label">카테고리 관리</div>
    <div id="categoryList"></div>
    <div class="settings-row" style="margin-top:8px">
      <input type="text" id="newCatInput" placeholder="새 카테고리 이름" maxlength="12"/>
      <button class="btn-sm" onclick="addCategory()">추가</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const DEFAULT_CATS = ['업무성과','협업태도','커뮤니케이션','성장가능성','기타'];
const PROVIDERS = [
  { id:'anthropic', label:'Claude',  key:true, ph:'sk-ant-...', models:['claude-sonnet-4-20250514','claude-opus-4-20250514','claude-haiku-4-5-20251001'] },
  { id:'openai',    label:'ChatGPT', key:true, ph:'sk-...',     models:['gpt-4o','gpt-4o-mini','gpt-4-turbo'] },
  { id:'gemini',    label:'Gemini',  key:true, ph:'AIza...',    models:['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash'] },
  { id:'ollama',    label:'Ollama',  key:false, ph:'',          models:[] },
];

let S = { members:[], entries:{}, categories:[...DEFAULT_CATS], selectedMember:null, selectedTag:null, summaries:{} };
let P = { selected:'anthropic', keys:{}, models:{}, ollamaAvailable:false, ollamaModels:[] };
let showAiOpts = false;

function loadAll() {
  try { const d=localStorage.getItem('obs_v4'); if(d) S={...S,...JSON.parse(d)}; } catch(e){}
  try { const d=localStorage.getItem('obs_p_v4'); if(d) P={...P,...JSON.parse(d)}; } catch(e){}
  if(!S.summaries) S.summaries={};
  if(!S.categories||!S.categories.length) S.categories=[...DEFAULT_CATS];
  if(!S.selectedTag) S.selectedTag=S.categories[0];
  checkOllama();
  render();
}
function saveS() { localStorage.setItem('obs_v4', JSON.stringify(S)); }
function saveP() { localStorage.setItem('obs_p_v4', JSON.stringify(P)); }

/* ── TOAST ── */
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ── OLLAMA ── */
async function checkOllama() {
  const badge=document.getElementById('ollamaStatus');
  try {
    const res=await fetch('http://localhost:11434/api/tags',{signal:AbortSignal.timeout(2500)});
    if(!res.ok) throw new Error();
    const data=await res.json();
    P.ollamaAvailable=true;
    P.ollamaModels=(data.models||[]).map(m=>m.name);
    if(!P.ollamaModels.length) P.ollamaModels=['llama3','mistral'];
    badge.textContent='로컬 연결됨'; badge.className='ollama-status ok';
  } catch {
    P.ollamaAvailable=false;
    badge.textContent='Ollama 미감지'; badge.className='ollama-status err';
  }
  renderProviderBar();
}

/* ── PROVIDER ── */
function selectProvider(id) {
  if(id==='ollama'&&!P.ollamaAvailable) return;
  P.selected=id; saveP(); renderProviderBar(); renderSettingsProvider();
}
function setKey(pid,val) { P.keys[pid]=val; saveP(); }
function setModel(pid,val) { P.models[pid]=val; saveP(); }

function renderProviderBar() {
  const el=document.getElementById('providerChips');
  el.innerHTML=PROVIDERS.map(p=>{
    const isO=p.id==='ollama', unavail=isO&&!P.ollamaAvailable, avail=isO&&P.ollamaAvailable, active=P.selected===p.id;
    let cls='pchip';
    if(active) cls+=' active'; else if(avail) cls+=' ok'; if(unavail) cls+=' disabled';
    const dot=avail?'<span class="live-dot"></span>':'';
    return `<button class="${cls}" onclick="selectProvider('${p.id}')">${dot}${p.label}</button>`;
  }).join('');
}

function renderSettingsProvider() {
  const chips=document.getElementById('settingsProviderChips');
  chips.innerHTML=PROVIDERS.map(p=>{
    const isO=p.id==='ollama', unavail=isO&&!P.ollamaAvailable, avail=isO&&P.ollamaAvailable, active=P.selected===p.id;
    let cls='pchip';
    if(active) cls+=' active'; else if(avail) cls+=' ok'; if(unavail) cls+=' disabled';
    return `<button class="${cls}" onclick="selectProvider('${p.id}')">${p.label}</button>`;
  }).join('');

  const cfg=document.getElementById('settingsProviderConfig');
  const p=PROVIDERS.find(x=>x.id===P.selected);
  if(!p){cfg.innerHTML='';return;}
  const models=p.id==='ollama'?P.ollamaModels:p.models;
  const curM=P.models[p.id]||models[0]||'';
  const modelSel=models.length?`<select onchange="setModel('${p.id}',this.value)">${models.map(m=>`<option value="${m}"${m===curM?' selected':''}>${m}</option>`).join('')}</select>`:'';
  if(p.key) {
    cfg.innerHTML=`<div class="provider-key-row"><label>${p.label} API 키</label><input type="password" placeholder="${p.ph}" value="${P.keys[p.id]||''}" oninput="setKey('${p.id}',this.value)"/>${modelSel?`<select onchange="setModel('${p.id}',this.value)">${models.map(m=>`<option value="${m}"${m===curM?' selected':''}>${m}</option>`).join('')}</select>`:''}</div>`;
  } else {
    cfg.innerHTML=`<div class="provider-key-row"><span style="font-size:12px;color:var(--text-3)">localhost:11434 · API 키 불필요</span>${modelSel?`<select style="margin-top:8px" onchange="setModel('${p.id}',this.value)">${models.map(m=>`<option value="${m}"${m===curM?' selected':''}>${m}</option>`).join('')}</select>`:''}</div>`;
  }
}

/* ── MEMBERS ── */
function addMember() {
  const inp=document.getElementById('newMemberInput');
  const name=inp.value.trim();
  if(!name||S.members.includes(name)){inp.focus();return;}
  S.members.push(name);
  if(!S.entries[name]) S.entries[name]=[];
  inp.value='';
  S.selectedMember=name;
  saveS(); render(); toast(`${name} 님이 추가됐어요`);
}
function deleteMember(name) {
  if(!confirm(`'${name}' 구성원과 모든 기록을 삭제할까요?`)) return;
  S.members=S.members.filter(m=>m!==name);
  delete S.entries[name]; delete S.summaries[name];
  if(S.selectedMember===name) S.selectedMember=S.members[0]||null;
  saveS(); render(); renderMemberList(); toast(`${name} 님이 삭제됐어요`);
}
function selectMember(name) { S.selectedMember=name; showAiOpts=false; render(); }
function initials(name){return name.slice(0,2);}

/* ── CATEGORIES ── */
function addCategory() {
  const inp=document.getElementById('newCatInput');
  const cat=inp.value.trim();
  if(!cat||S.categories.includes(cat)) return;
  S.categories.push(cat); inp.value='';
  saveS(); renderCategoryList();
}
function deleteCategory(cat) {
  if(S.categories.length<=1) return;
  S.categories=S.categories.filter(c=>c!==cat);
  if(S.selectedTag===cat) S.selectedTag=S.categories[0];
  saveS(); renderCategoryList();
}
function renderCategoryList() {
  document.getElementById('categoryList').innerHTML=S.categories.map(cat=>`
    <div class="category-item">
      <span>${cat}</span>
      ${S.categories.length>1?`<button class="btn-sm danger" onclick="deleteCategory('${cat}')">삭제</button>`:''}
    </div>`).join('');
}

/* ── ENTRIES ── */
function saveEntry() {
  const name=S.selectedMember;
  if(!name) return;
  const text=document.getElementById('entryText').value.trim();
  if(!text) return;
  S.entries[name].unshift({id:Date.now(),tag:S.selectedTag,text,date:new Date().toLocaleDateString('ko-KR')});
  delete S.summaries[name];
  document.getElementById('entryText').value='';
  saveS(); closeAll(); render(); toast('기록이 저장됐어요');
}
function deleteEntry(name,id) {
  S.entries[name]=S.entries[name].filter(e=>e.id!==id);
  delete S.summaries[name];
  saveS(); render();
}

/* ── AI ── */
async function callAPI(prompt) {
  const pid=P.selected, p=PROVIDERS.find(x=>x.id===pid);
  const model=P.models[pid]||(pid==='ollama'?P.ollamaModels[0]:p.models[0]);
  if(pid==='anthropic') {
    const key=P.keys.anthropic||''; if(!key) throw new Error('Claude API 키를 설정에서 입력해 주세요.');
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify({model,max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const d=await r.json(); if(!d.content) throw new Error(d.error?.message||'API 오류'); return d.content[0].text;
  }
  if(pid==='openai') {
    const key=P.keys.openai||''; if(!key) throw new Error('OpenAI API 키를 설정에서 입력해 주세요.');
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model,max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const d=await r.json(); if(!d.choices) throw new Error(d.error?.message||'API 오류'); return d.choices[0].message.content;
  }
  if(pid==='gemini') {
    const key=P.keys.gemini||''; if(!key) throw new Error('Gemini API 키를 설정에서 입력해 주세요.');
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    const d=await r.json(); if(!d.candidates) throw new Error(d.error?.message||'API 오류'); return d.candidates[0].content.parts[0].text;
  }
  if(pid==='ollama') {
    const r=await fetch('http://localhost:11434/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model,stream:false,messages:[{role:'user',content:prompt}]})});
    const d=await r.json(); if(!d.message) throw new Error('Ollama 응답 오류'); return d.message.content;
  }
}
async function generateSummary(type) {
  const name=S.selectedMember; const entries=S.entries[name];
  if(!entries||!entries.length) return;
  showAiOpts=false;
  if(!S.summaries[name]) S.summaries[name]={};
  S.summaries[name].loading=type; S.summaries[name].activeTab=type;
  render();
  const txt=entries.map(e=>`[${e.tag}] ${e.date}: ${e.text}`).join('\n');
  const prompts={
    memo:`아래는 '${name}'에 대한 리더의 관찰 기록입니다.\n\n${txt}\n\n이 기록을 바탕으로 평가 시즌에 참고할 수 있는 간결한 메모를 작성해 주세요.`,
    feedback:`아래는 '${name}'에 대한 리더의 관찰 기록입니다.\n\n${txt}\n\n이 기록을 바탕으로 면담 전 전달할 수 있는 건설적인 피드백 초안을 작성해 주세요. 강점과 개선 포인트를 균형 있게 담아주세요.`,
    evidence:`아래는 '${name}'에 대한 리더의 관찰 기록입니다.\n\n${txt}\n\n이 기록을 평가 점수 산정의 근거 자료로 활용할 수 있도록 카테고리별 핵심 사례를 bullet로 정리해 주세요.`
  };
  try {
    const result=await callAPI(prompts[type]);
    S.summaries[name][type]=result; delete S.summaries[name].loading;
    saveS(); render(); toast('AI 요약이 완성됐어요');
  } catch(e) {
    delete S.summaries[name].loading;
    render(); toast('오류: '+e.message);
  }
}
function switchTab(tab) {
  const name=S.selectedMember;
  if(!S.summaries[name]) S.summaries[name]={};
  S.summaries[name].activeTab=tab; render();
}

/* ── SHEET CONTROLS ── */
function openSheet(id) {
  document.getElementById('overlay').classList.add('open');
  document.getElementById(id).classList.add('open');
}
function closeAll() {
  document.getElementById('overlay').classList.remove('open');
  ['recordSheet','memberSheet','settingsSheet'].forEach(id=>document.getElementById(id).classList.remove('open'));
}
function openRecord() {
  if(!S.selectedMember) { openMemberManager(); return; }
  document.getElementById('recordSheetTitle').textContent=`${S.selectedMember} 님 기록`;
  renderTagRow();
  document.getElementById('entryText').value='';
  openSheet('recordSheet');
  setTimeout(()=>document.getElementById('entryText').focus(),350);
}
function openMemberManager() {
  renderMemberList();
  document.getElementById('newMemberInput').value='';
  openSheet('memberSheet');
  setTimeout(()=>document.getElementById('newMemberInput').focus(),350);
}
function openSettings() {
  renderSettingsProvider();
  renderCategoryList();
  openSheet('settingsSheet');
}
document.getElementById('newMemberInput').addEventListener('keydown',e=>{if(e.key==='Enter')addMember();});
document.getElementById('newCatInput').addEventListener('keydown',e=>{if(e.key==='Enter')addCategory();});

/* ── RENDER TAG ROW ── */
function renderTagRow() {
  document.getElementById('tagRow').innerHTML=S.categories.map(t=>
    `<button class="tag-pill ${S.selectedTag===t?'selected':''}" data-tag="${t}" onclick="selectTag('${t}')">${t}</button>`
  ).join('');
}
function selectTag(tag) {
  S.selectedTag=tag;
  document.querySelectorAll('.tag-pill').forEach(t=>t.classList.toggle('selected',t.dataset.tag===tag));
}

/* ── RENDER MEMBER LIST (sheet) ── */
function renderMemberList() {
  document.getElementById('memberListEl').innerHTML=S.members.length===0
    ?'<p style="font-size:13px;color:var(--text-3);text-align:center;padding:1rem">아직 구성원이 없어요.</p>'
    :S.members.map(name=>{
      const cnt=(S.entries[name]||[]).length;
      return `<div class="member-list-item">
        <div class="m-avatar">${initials(name)}</div>
        <div class="m-info"><div class="m-name">${name}</div><div class="m-count">기록 ${cnt}건</div></div>
        <button class="btn-sm danger" onclick="deleteMember('${name}')">삭제</button>
      </div>`;
    }).join('');
}

/* ── MAIN RENDER ── */
function render() {
  renderProviderBar();
  renderMemberTabs();
  renderContent();
}

function renderMemberTabs() {
  const el=document.getElementById('memberTabs');
  el.innerHTML=S.members.map(name=>{
    const cnt=(S.entries[name]||[]).length;
    const active=S.selectedMember===name;
    return `<div class="mtab ${active?'active':''}" onclick="selectMember('${name}')">
      ${name}<span class="badge">${cnt}</span>
    </div>`;
  }).join('')+`<button class="btn-add-member" onclick="openMemberManager()">+ 추가</button>`;

  const fab=document.getElementById('fab');
  fab.style.display=S.members.length>0?'flex':'none';
}

function renderContent() {
  const empty=document.getElementById('emptyState');
  const content=document.getElementById('memberContent');
  const name=S.selectedMember;

  if(!name||S.members.length===0) {
    empty.style.display='block'; content.style.display='none'; return;
  }
  empty.style.display='none'; content.style.display='block';

  const entries=S.entries[name]||[];
  const sum=S.summaries[name]||{};
  const activeTab=sum.activeTab||'memo';
  const tabs=[{k:'memo',l:'평가 메모'},{k:'feedback',l:'피드백 초안'},{k:'evidence',l:'근거 자료'}];
  const provLabel=PROVIDERS.find(p=>p.id===P.selected)?.label||'';
  const hasSummary=sum.memo||sum.feedback||sum.evidence;

  let summaryHtml='';
  if(hasSummary||sum.loading) {
    const bodyHtml=sum.loading
      ?'<div class="loading-dots"><span></span><span></span><span></span></div>'
      :`<div class="summary-body">${(sum[activeTab]||'').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;
    summaryHtml=`<div class="summary-box">
      <div class="summary-header"><h4>✨ AI 요약</h4><span class="summary-prov">${provLabel}</span></div>
      <div class="stabs">${tabs.map(t=>`<button class="stab ${activeTab===t.k?'active':''}" onclick="switchTab('${t.k}')">${t.l}</button>`).join('')}</div>
      ${bodyHtml}
    </div>`;
  }

  const aiHtml=entries.length>0?`<div class="btn-ai-wrap">
    <button class="btn-ai" onclick="toggleAiOpts()">✨ AI로 요약하기</button>
    <div class="ai-opts" id="aiOpts" style="display:${showAiOpts?'flex':'none'}">
      ${tabs.map(t=>`<button class="ai-opt" onclick="generateSummary('${t.k}')">${t.l}</button>`).join('')}
    </div>
  </div>`:'';

  const entriesHtml=entries.length===0
    ?`<p style="text-align:center;color:var(--text-3);font-size:13px;padding:2rem 0">아직 기록이 없어요.<br>오른쪽 아래 + 버튼으로 첫 기록을 남겨보세요 :)</p>`
    :entries.map(e=>`<div class="entry-card">
      <div class="entry-meta">
        <span class="etag ${e.tag}">${e.tag}</span>
        <span class="edate">${e.date}</span>
      </div>
      <div class="etext">${e.text.replace(/</g,'&lt;')}</div>
      <button class="btn-del" onclick="deleteEntry('${name}',${e.id})">삭제</button>
    </div>`).join('');

  content.innerHTML=`<div class="member-section">
    ${summaryHtml}
    ${aiHtml}
    <div class="section-label">기록 목록 <span class="count-badge">${entries.length}건</span></div>
    ${entriesHtml}
  </div>`;
}

function toggleAiOpts() {
  showAiOpts=!showAiOpts;
  const el=document.getElementById('aiOpts');
  if(el) el.style.display=showAiOpts?'flex':'none';
}

loadAll();
</script>
</body>
</html>
